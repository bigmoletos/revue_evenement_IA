name: Revue Événements IA France

on:
  schedule:
    - cron: '30 6 * * 1-5'  # Lundi-vendredi 06h30 UTC (08h30 Paris)
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.REVUE_GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python run_ci.py
